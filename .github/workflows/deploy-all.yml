# Deploy to both Cloudflare Pages and Cloudflare Workers in parallel
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN        — API token with Pages + Workers edit permissions
#   CLOUDFLARE_ACCOUNT_ID       — Found in Cloudflare dashboard → right sidebar
#   NEXT_PUBLIC_SUPABASE_URL    — Supabase project URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY — Supabase anon key
#   NEXT_PUBLIC_SITE_URL        — Production URL (e.g. https://peaklearn.pages.dev)
#
# This workflow builds once, then deploys to both targets in parallel.

name: Deploy to Cloudflare (Pages + Workers)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-all-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build for Cloudflare
        run: npm run build:cloudflare
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-build
          path: .vercel/output/static
          retention-days: 1

  deploy-pages:
    name: Deploy → Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-build
          path: .vercel/output/static

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=peaklearn --commit-dirty=true

  deploy-worker:
    name: Deploy → Cloudflare Workers
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-build
          path: .vercel/output/static

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
