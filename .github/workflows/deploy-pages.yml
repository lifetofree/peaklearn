# Deploy to Cloudflare Pages
#
# NOTE: This workflow requires @cloudflare/next-on-pages, which conflicts with
# @opennextjs/cloudflare (used for Workers deploys). To re-enable Pages CI,
# re-add @cloudflare/next-on-pages to package.json and accept the Workers CI
# breaking. For now, deploy Pages locally with:
#   npm install --save-dev @cloudflare/next-on-pages
#   npm run build:cloudflare && npx wrangler pages deploy .vercel/output/static --project-name=peaklearn --branch=production
#
# Or use the OpenNext Cloudflare Workers deployment (wrangler.jsonc) which is
# the recommended path going forward.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN   — API token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — Found in Cloudflare dashboard → right sidebar

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build for Cloudflare Pages
        run: npm install --save-dev @cloudflare/next-on-pages && npx @cloudflare/next-on-pages

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: pages deploy .vercel/output/static --project-name=peaklearn --branch=production --commit-dirty=true
